name: Trigger auto deployment for hire-ready-ai

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/hire-ready-ai-AutoDeployTrigger-a3abe190-6b99-467a-8c1e-325f1effab7d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HIREREADYAI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HIREREADYAI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HIREREADYAI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.HIREREADYAI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.HIREREADYAI_REGISTRY_PASSWORD }}
          containerAppName: hire-ready-ai
          resourceGroup: hire-ready-container-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


